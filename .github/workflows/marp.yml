name: Deploy Marp Slides

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Marp Build (HTML & PDF)
        run: |
          # 1. Unimos todos los archivos numerados en uno solo (input.md)
          # Esto asegura que se procesen todos los temas en orden
          rm -f input.md
          for f in $(ls -1 slides/[0-9]*.md | sort); do
            cat "$f" >> input.md
          done
          
          echo "Archivo combinado generado: input.md"

          # 2. FIX DE PERMISOS (Vital para que Docker pueda escribir en el volumen)
          chmod 777 .
          chmod 777 input.md

          # 3. Generar HTML
          # Añadimos los argumentos de chrome también al HTML por seguridad en entornos CI
          docker run --rm -v $GITHUB_WORKSPACE:/home/marp/app \
            marpteam/marp-cli \
            --chrome-arg --no-sandbox --chrome-arg --disable-setuid-sandbox \
            --html input.md -o index.html

          # 4. Generar PDF
          docker run --rm -v $GITHUB_WORKSPACE:/home/marp/app \
            marpteam/marp-cli \
            --chrome-arg --no-sandbox --chrome-arg --disable-setuid-sandbox \
            --allow-local-files \
            --pdf input.md -o presentacion-forense-uva.pdf

      - name: Prepare public folder
        run: |
          mkdir -p public
          [ -f index.html ] && mv index.html public/
          [ -f presentacion-forense-uva.pdf ] && mv presentacion-forense-uva.pdf public/
          
          # Copiamos las imágenes (buscando en ambas rutas posibles)
          cp -r images public/ 2>/dev/null || true
          cp -r slides/images public/ 2>/dev/null || true
          
          # Limpiamos el temporal para que no se suba al repo
          rm -f input.md

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
