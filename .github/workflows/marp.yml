name: Deploy Marp Slides

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Marp Build
      run: |
        # 1. Limpiamos y combinamos archivos
        rm -f slides/full-slides.md
        for f in $(ls -1 slides/[0-9]*.md | sort); do
          cat "$f" >> slides/full-slides.md
          echo -e "\n---\n" >> slides/full-slides.md
        done

        # 2. Ejecutamos Marp con los argumentos de seguridad necesarios
        # Usamos una sola ejecución para evitar descargar la imagen varias veces
        
        # Generar HTML
        docker run --rm -v $GITHUB_WORKSPACE:/home/marp/app \
          -e MARP_USER=$(id -u):$(id -g) \
          marpteam/marp-cli \
          --browser-arg --no-sandbox \
          --browser-arg --disable-setuid-sandbox \
          --html --allow-local-files \
          slides/full-slides.md -o slides/index.html

        # Generar PDF
        docker run --rm -v $GITHUB_WORKSPACE:/home/marp/app \
          -e MARP_USER=$(id -u):$(id -g) \
          marpteam/marp-cli \
          --browser-arg --no-sandbox \
          --browser-arg --disable-setuid-sandbox \
          --allow-local-files \
          --pdf slides/full-slides.md -o slides/presentacion-forense-uva.pdf

    - name: Prepare public folder
      run: |
        mkdir -p public
        mv slides/index.html public/
        mv slides/presentacion-forense-uva.pdf public/
        # Copiamos las imágenes para que el HTML las encuentre
        cp -r slides/images public/ 2>/dev/null || true

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./public
        publish_branch: gh-pages
